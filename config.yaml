# EdgeEdu Offline AI Chatbot configuration.
# Every value can be overridden by an environment variable using the prefix
# EDGEEDU_ and a double-underscore for nesting, e.g.
#   EDGEEDU_MODEL__NAME=Qwen/Qwen2.5-1.5B-Instruct
#   EDGEEDU_MODEL__ENABLED=false

paths:
  data_dir: data
  corpus_file: data/curriculum.jsonl
  index_dir: .index
  history_dir: .history

model:
  enabled: true                 # false -> use the MockLanguageModel (no weights)
  name: google/gemma-2-2b-it    # gated: needs `huggingface-cli login` + license
  dtype: auto                   # auto | float32 | float16 | bfloat16
  device: auto                  # auto | cpu | cuda
  max_new_tokens: 512
  temperature: 0.3
  top_p: 0.9

embedding:
  enabled: true                 # dense retrieval; falls back to BM25 if unavailable
  name: intfloat/multilingual-e5-small
  query_prefix: "query: "       # e5 models expect these prefixes
  passage_prefix: "passage: "
  batch_size: 32

retrieval:
  top_k: 5                       # chunks passed to the LLM as context
  candidate_k: 30                # per-retriever candidate pool before fusion
  rrf_k: 60                      # reciprocal-rank-fusion constant
  keyword_boost: 3.0             # BM25 field weighting (mirrors the web ranker)
  heading_boost: 2.0
  multi_hop: false               # second retrieval pass using the draft answer

history:
  max_turns: 12
  max_context_tokens: 1536
  persist: true

server:
  host: 127.0.0.1
  port: 8000

default_language: English        # fallback when language detection is ambiguous
